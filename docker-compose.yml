services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: beginner_agent_postgres
    environment:
      POSTGRES_USER: beginner_agent
      POSTGRES_PASSWORD: beginner_agent
      POSTGRES_DB: beginner_agent
    ports:
      - "55432:5432"
    volumes:
      - beginner_agent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beginner_agent -d beginner_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  beginner_agent_postgres_data:
